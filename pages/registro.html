<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoAgenda — Registro</title>
  <link rel="stylesheet" href="../css/global.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }

    .reg-wrap { width:100%; max-width:520px; animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1); }

    .back-link {
      display:inline-flex; align-items:center; gap:6px;
      color:var(--text-muted); font-size:0.82rem; text-decoration:none;
      margin-bottom:24px; transition:color var(--t-fast);
    }
    .back-link:hover { color:var(--green-300); }

    .reg-card {
      background:var(--bg-card);
      border:1px solid var(--border-soft);
      border-radius:var(--r-xl);
      padding:40px;
      box-shadow:0 20px 80px rgba(0,0,0,0.6), var(--shadow-glow);
    }

    .reg-title {
      font-family:var(--font-display); font-size:1.7rem; font-weight:900;
      margin-bottom:4px;
    }
    .reg-subtitle { color:var(--text-muted); font-size:0.85rem; margin-bottom:28px; }

    /* Avatar picker */
    .avatar-picker {
      display:flex; flex-direction:column; align-items:center; gap:12px;
      margin-bottom:28px;
    }
    .avatar-preview {
      width:90px; height:90px; border-radius:50%;
      border:3px solid var(--green-600);
      object-fit:cover; cursor:pointer;
      transition:all var(--t-mid);
      box-shadow: 0 0 20px rgba(34,197,94,0.2);
    }
    .avatar-preview:hover { border-color:var(--green-400); transform:scale(1.05); }
    .avatar-hint { font-size:0.75rem; color:var(--text-muted); }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

    .btn-register { width:100%; margin-top:8px; }

    .terms {
      font-size:0.76rem; color:var(--text-muted); text-align:center; margin-top:14px;
    }
    .terms a { color:var(--green-300); text-decoration:none; }

    .strengths { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
    .strength-bar {
      height:4px; flex:1; border-radius:2px;
      background:var(--border-soft); transition:background 0.3s;
      min-width:30px;
    }

    #file-input { display:none; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="toast-container"></div>

  <div class="reg-wrap">
    <a href="../index.html" class="back-link">← Volver al inicio</a>

    <div class="reg-card">
      <div class="reg-title">Únete a EcoAgenda 🌱</div>
      <div class="reg-subtitle">Crea tu cuenta y empieza a cuidar el planeta</div>

      <!-- Avatar -->
      <div class="avatar-picker">
        <img src="https://ui-avatars.com/api/?name=Eco&background=0b5022&color=86efac&bold=true&size=200"
             id="avatar-preview" class="avatar-preview"
             onclick="document.getElementById('file-input').click()"
             title="Haz clic para cambiar foto" />
        <input type="file" id="file-input" accept="image/*" onchange="previewPhoto(this)" />
        <div class="avatar-hint">📷 Toca la imagen para subir tu foto</div>
      </div>

      <!-- Name row -->
      <div class="grid-2">
        <div class="input-group">
          <label class="input-label">Nombre</label>
          <input class="input-field" type="text" id="reg-nombre" placeholder="Tu nombre" />
        </div>
        <div class="input-group">
          <label class="input-label">Apellido</label>
          <input class="input-field" type="text" id="reg-apellido" placeholder="Tu apellido" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Nombre de usuario</label>
        <div class="input-with-icon">
          <span class="input-icon">@</span>
          <input class="input-field" type="text" id="reg-username" placeholder="eco_usuario" oninput="checkUsername(this)" />
        </div>
        <div id="username-check" style="font-size:0.75rem;margin-top:4px;"></div>
      </div>

      <div class="input-group">
        <label class="input-label">Correo electrónico</label>
        <div class="input-with-icon">
          <span class="input-icon">✉️</span>
          <input class="input-field" type="email" id="reg-email" placeholder="tu@correo.com" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Contraseña</label>
        <div class="input-with-icon">
          <span class="input-icon">🔒</span>
          <input class="input-field" type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" oninput="checkStrength(this)" />
        </div>
        <div class="strengths" id="strength-bars">
          <div class="strength-bar" id="s1"></div>
          <div class="strength-bar" id="s2"></div>
          <div class="strength-bar" id="s3"></div>
          <div class="strength-bar" id="s4"></div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Confirmar contraseña</label>
        <div class="input-with-icon">
          <span class="input-icon">✅</span>
          <input class="input-field" type="password" id="reg-pass2" placeholder="Repite la contraseña" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Escuela (opcional)</label>
        <div class="input-with-icon">
          <span class="input-icon">🏫</span>
          <input class="input-field" type="text" id="reg-escuela" placeholder="Nombre de tu escuela" />
        </div>
      </div>

      <button class="btn btn-primary btn-xl btn-register" id="btn-reg" onclick="register()">
        Crear cuenta 🌿
      </button>

      <div class="terms">
        Al registrarte aceptas nuestros <a href="#">Términos de uso</a> y
        <a href="#">Política de privacidad</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initParticles, toast } from '../js/utils.js';
    import { registerEmail } from '../js/auth.js';
    import { auth, db, storage } from '../js/firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    initParticles();
    onAuthStateChanged(auth, u => { if(u) location.href = 'inicio.html'; });

    let photoFile = null;

    window.previewPhoto = (input) => {
      if (!input.files[0]) return;
      photoFile = input.files[0];
      const reader = new FileReader();
      reader.onload = e => { document.getElementById('avatar-preview').src = e.target.result; };
      reader.readAsDataURL(photoFile);
    };

    window.checkStrength = (input) => {
      const v = input.value;
      const checks = [v.length >= 6, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)];
      const colors = ['var(--accent-rose)','var(--accent-amber)','var(--green-400)','var(--accent-lime)'];
      const strength = checks.filter(Boolean).length;
      ['s1','s2','s3','s4'].forEach((id, i) => {
        document.getElementById(id).style.background = i < strength ? colors[strength-1] : 'var(--border-soft)';
      });
    };

    window.checkUsername = (input) => {
      const el = document.getElementById('username-check');
      const v = input.value.trim();
      if (v.length < 3) { el.style.color='var(--accent-amber)'; el.textContent='Mínimo 3 caracteres'; return; }
      if (/[^a-z0-9_]/.test(v)) { el.style.color='var(--accent-rose)'; el.textContent='Solo letras, números y _'; return; }
      el.style.color='var(--green-400)'; el.textContent='✓ Disponible (verificar en registro)';
    };

    window.register = async () => {
      const nombre    = document.getElementById('reg-nombre').value.trim();
      const apellido  = document.getElementById('reg-apellido').value.trim();
      const username  = document.getElementById('reg-username').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const pass      = document.getElementById('reg-pass').value;
      const pass2     = document.getElementById('reg-pass2').value;
      const escuela   = document.getElementById('reg-escuela').value.trim();

      if (!nombre || !email || !pass || !username) { toast('Completa los campos obligatorios', 'warning'); return; }
      if (pass !== pass2) { toast('Las contraseñas no coinciden', 'error'); return; }
      if (pass.length < 6) { toast('Contraseña muy corta (mínimo 6 caracteres)', 'warning'); return; }

      const btn = document.getElementById('btn-reg');
      btn.innerHTML = '<div class="spinner"></div> Creando cuenta...'; btn.disabled = true;

      try {
        const displayName = `${nombre} ${apellido}`.trim();
        let photoURL = '';

        // Register user
        const user = await registerEmail(email, pass, displayName, photoURL);

        // Upload photo if selected
        if (photoFile && user) {
          const sRef = storageRef(storage, `avatars/${user.uid}`);
          await uploadBytes(sRef, photoFile);
          photoURL = await getDownloadURL(sRef);
        }

        // Save extra profile data
        await setDoc(doc(db, 'users', user.uid), {
          username, escuela, photoURL,
          puntos: 0, nivel: 'semilla', accesorios: [],
          updatedAt: serverTimestamp()
        }, { merge: true });

        toast('¡Bienvenido a EcoAgenda! 🌱', 'success');
        setTimeout(() => location.href = 'inicio.html', 1200);
      } catch(e) {
        const msgs = {
          'auth/email-already-in-use': 'Este correo ya está registrado',
          'auth/invalid-email': 'Correo inválido',
          'auth/weak-password': 'Contraseña muy débil'
        };
        toast(msgs[e.code] || e.message, 'error');
        btn.innerHTML = 'Crear cuenta 🌿'; btn.disabled = false;
      }
    };
  </script>
</body>
</html>
