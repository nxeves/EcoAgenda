<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoAgenda — Inicia sesión</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%; max-width: 440px;
      padding: 20px;
      animation: slideUp 0.7s cubic-bezier(0.34,1.56,0.64,1);
    }

    .brand {
      text-align: center; margin-bottom: 36px;
    }
    .brand-icon {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 24px rgba(94, 24, 10, 0.834));
      margin-bottom: 10px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .brand-name {
      font-family: var(--font-display); font-size: 2.2rem; font-weight: 900;
      background: linear-gradient(135deg, var(--green-300), var(--accent-lime));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }
    .brand-tagline {
      color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-xl);
      padding: 36px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6), var(--shadow-glow);
    }

    .tab-switch {
      display: flex; background: var(--bg-elevated);
      border-radius: var(--r-full); padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 8px;
      border: none; background: transparent;
      color: var(--text-muted); font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 700;
      border-radius: var(--r-full); cursor: pointer;
      transition: all var(--t-mid);
    }
    .tab-btn.active {
      background: var(--bg-card);
      color: var(--green-300);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .form-section { display: none; }
    .form-section.visible { display: block; }

    .btn-google {
      width: 100%; margin-bottom: 16px;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border-mid);
      color: var(--text-primary);
      gap: 10px; font-weight: 700;
      transition: all var(--t-mid);
    }
    .btn-google:hover { border-color: var(--green-500); background: rgba(34,197,94,0.06); }
    .btn-google img { width: 18px; height: 18px; }

    .btn-submit { width: 100%; margin-top: 4px; }

    .forgot {
      text-align: right; margin-top: -8px; margin-bottom: 16px;
      font-size: 0.78rem;
    }
    .forgot a { color: var(--text-muted); text-decoration: none; transition: color var(--t-fast); }
    .forgot a:hover { color: var(--green-300); }

    .register-link {
      text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .register-link a { color: var(--green-300); text-decoration: none; font-weight: 700; }
    .register-link a:hover { text-decoration: underline; }

    .eco-features {
      display: flex; gap: 12px; justify-content: center;
      margin-top: 28px; flex-wrap: wrap;
    }
    .eco-feat {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; color: var(--text-muted);
      padding: 6px 12px;
      background: var(--bg-elevated);
      border-radius: var(--r-full);
      border: 1px solid var(--border-soft);
    }

    @media (max-width: 414px) {
      .login-wrap { padding: 16px; }
      .brand { margin-bottom: 24px; }
      .brand-icon { font-size: 2.8rem; margin-bottom: 6px; }
      .brand-name { font-size: 1.8rem; }
      .brand-tagline { font-size: 0.75rem; }
      
      .login-card { padding: 24px 20px; border-radius: var(--r-lg); }
      .tab-switch { margin-bottom: 20px; }
      .tab-btn { padding: 6px; font-size: 0.75rem; }
      
      .btn { padding: 10px; font-size: 0.8rem; }
      .btn-google { margin-bottom: 12px; }
      .input-group { margin-bottom: 12px; }
      .input-label { font-size: 0.65rem; }
      .input-field { padding: 10px; font-size: 0.85rem; }
      
      .register-link { font-size: 0.75rem; margin-top: 16px; }
      .eco-features { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="toast-container"></div>

  <div class="login-wrap">
    <div class="brand">
      <span class="brand-icon">🌍</span>
      <div class="brand-name">EcoAgenda</div>
      <div class="brand-tagline">Tu plataforma escolar ecológica</div>
    </div>

    <div class="login-card">
      <div class="tab-switch">
        <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" onclick="switchTab('quick')">Acceso rápido</button>
      </div>

      <!-- Login form -->
      <div class="form-section visible" id="section-login">
        <button class="btn btn-google" onclick="loginGoogle()" id="btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Continuar con Google
        </button>

        <div class="divider-text">o usa tu correo</div>
        <br>

        <div class="input-group">
          <label class="input-label">Correo electrónico</label>
          <div class="input-with-icon">
            <span class="input-icon">✉️</span>
            <input class="input-field" type="email" id="login-email" placeholder="tu@correo.com" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input class="input-field" type="password" id="login-pass" placeholder="••••••••" />
          </div>
        </div>

        <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>

        <button class="btn btn-primary btn-submit btn-lg" onclick="loginEmail()" id="btn-login">
          Entrar a EcoAgenda 🌿
        </button>

        <div class="register-link">
          ¿Sin cuenta? <a href="pages/registro.html">Regístrate gratis</a>
        </div>
      </div>

      <!-- Demo quick access -->
      <div class="form-section" id="section-quick">
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:20px;text-align:center;">
          Accede en modo demo para explorar todas las funciones sin registrarte.
        </p>
        <button class="btn btn-primary btn-submit btn-lg" onclick="demoLogin()">
          🎮 Entrar como Demo
        </button>
        <div class="register-link" style="margin-top:16px;">
          <a href="pages/registro.html">Crear cuenta real →</a>
        </div>
      </div>
    </div>

    <div class="eco-features">
      <div class="eco-feat">📝 Agenda</div>
      <div class="eco-feat">♻️ Reciclaje</div>
      <div class="eco-feat">💬 Chat</div>
      <div class="eco-feat">🎮 Juego</div>
      <div class="eco-feat">🏆 Ranking</div>
      <div class="eco-feat">🤖 EcoBot</div>
    </div>
  </div>

  <script type="module">
    import { initParticles, toast } from './js/utils.js';
    import { loginEmail as doLogin, loginGoogle as doGoogle } from './js/auth.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { auth } from './js/firebase.js';

    initParticles();

    // Redirect if already logged in
    onAuthStateChanged(auth, u => { if (u) location.href = 'pages/inicio.html'; });

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='quick'&&i===1)));
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('visible'));
      document.getElementById('section-' + tab).classList.add('visible');
    };

    window.loginEmail = async () => {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) { toast('Completa todos los campos', 'warning'); return; }
      const btn = document.getElementById('btn-login');
      btn.innerHTML = '<div class="spinner"></div> Entrando...';
      btn.disabled = true;
      try {
        await doLogin(email, pass);
        location.href = 'pages/inicio.html';
      } catch(e) {
        toast('Credenciales incorrectas', 'error');
        btn.innerHTML = 'Entrar a EcoAgenda 🌿';
        btn.disabled = false;
      }
    };

    window.loginGoogle = async () => {
      const btn = document.getElementById('btn-google');
      btn.innerHTML = '<div class="spinner"></div> Conectando...';
      btn.disabled = true;
      try {
        await doGoogle();
        location.href = 'pages/inicio.html';
      } catch(e) {
        toast('Error con Google: ' + e.message, 'error');
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px" /> Continuar con Google';
        btn.disabled = false;
      }
    };

    window.demoLogin = () => {
      sessionStorage.setItem('eco_demo', '1');
      sessionStorage.setItem('eco_user', JSON.stringify({
        uid: 'demo', displayName: 'EcoDemo', puntos: 450, nivel: 'planta',
        photoURL: '', email: 'demo@ecoagenda.app'
      }));
      location.href = 'pages/inicio.html';
    };

    // Enter key submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.loginEmail();
    });
  </script>
</body>
</html>
